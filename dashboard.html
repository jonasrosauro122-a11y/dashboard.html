<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lava Training Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body class="bg-black text-white">

<!-- NAVBAR -->
<div class="flex justify-between items-center p-4 border-b border-gray-800">
  <h1 class="text-orange-500 text-xl font-bold">🔥 Lava Training</h1>

  <div id="user-section" class="hidden space-x-4">
    <span id="user-email"></span>
    <button onclick="logout()" class="bg-red-500 px-3 py-1 rounded">Logout</button>
  </div>
</div>

<!-- LOGIN SCREEN -->
<div id="login-box" class="fixed inset-0 flex items-center justify-center bg-black z-50">
  <div class="bg-gray-900 p-8 rounded w-80">

    <h2 class="text-2xl mb-4">VA Login</h2>

    <input id="username" type="text" placeholder="Username (e.g. nash)"
      class="w-full p-2 mb-4 bg-black border border-gray-700 rounded">

    <!-- LOGIN -->
    <button onclick="login()"
      class="w-full bg-orange-500 py-2 rounded mb-2 hover:opacity-80">
      Login
    </button>

    <!-- SIGN UP -->
    <button onclick="signup()"
      class="w-full border border-orange-500 py-2 rounded hover:bg-orange-500/20">
      Sign Up
    </button>

  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden p-6">

  <h2 class="text-xl mb-6">Dashboard</h2>

  <div class="grid md:grid-cols-3 gap-4">
    <div class="bg-gray-900 p-4 rounded">Clients: <span id="client-count">0</span></div>
    <div class="bg-gray-900 p-4 rounded">Leads: <span id="lead-count">0</span></div>
    <div class="bg-gray-900 p-4 rounded">Policies: <span id="policy-count">0</span></div>
  </div>

</div>

<script>
  // 🔑 SUPABASE CONFIG (REPLACE THIS)
  const SUPABASE_URL = "https://https://wgfptdxqpupblzmvixvi.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndnZnB0ZHhxcHVwYmx6bXZpeHZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTM2OTIsImV4cCI6MjA5MjM2OTY5Mn0.JgrpA9sGscsleahi31Njb3fch8nntNDg0qq7pngwR6U";

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // 🧠 HELPERS
  function getUsername() {
    return document.getElementById("username").value.trim().toLowerCase();
  }

  function generateEmail() {
    return `${getUsername()}@lavatraining.com`;
  }

  function defaultPassword() {
    return "LavaTraining2026!!";
  }

  // 🔐 SHOW / HIDE UI
  function showDashboard(user) {
    document.getElementById("login-box").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");

    document.getElementById("user-section").classList.remove("hidden");
    document.getElementById("user-email").innerText = user.email;
  }

  function showLogin() {
    document.getElementById("login-box").classList.remove("hidden");
    document.getElementById("dashboard").classList.add("hidden");
    document.getElementById("user-section").classList.add("hidden");
  }

  // 🔐 SIGN UP
  async function signup() {
    const username = getUsername();

    if (!username) {
      alert("Enter username");
      return;
    }

    const email = generateEmail();
    const password = defaultPassword();

    const { error } = await supabase.auth.signUp({
      email,
      password
    });

    if (error) {
      alert(error.message);
    } else {
      alert(`Account created:\n${email}`);
    }
  }

  // 🔐 LOGIN
  async function login() {
    const username = getUsername();

    if (!username) {
      alert("Enter username");
      return;
    }

    const email = generateEmail();
    const password = defaultPassword();

    const { error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      alert(error.message);
    }
  }

  // 🚪 LOGOUT
  async function logout() {
    await supabase.auth.signOut();
  }

  // 📡 AUTH STATE LISTENER
  supabase.auth.onAuthStateChange((event, session) => {
    if (session) {
      showDashboard(session.user);
    } else {
      showLogin();
    }
  });

  // 🚀 INIT
  window.onload = async () => {
    const { data } = await supabase.auth.getSession();

    if (data.session) {
      showDashboard(data.session.user);
    } else {
      showLogin();
    }
  };
</script>

</body>
</html>
