<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lava Carrier Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body class="bg-black text-white">

<!-- NAVBAR -->
<div class="flex justify-between items-center p-4 border-b border-gray-800">
  <h1 class="text-orange-500 text-xl font-bold">🔥 Lava Carrier</h1>

  <div id="auth-section">
    <button onclick="showLogin()" class="bg-orange-500 px-4 py-2 rounded">Login</button>
  </div>

  <div id="user-section" class="hidden space-x-4">
    <span id="user-email"></span>
    <button onclick="logout()" class="bg-red-500 px-3 py-1 rounded">Logout</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login-box" class="flex items-center justify-center h-screen">
  <div class="bg-gray-900 p-8 rounded w-80">
    <h2 class="text-2xl mb-4">Login</h2>

    <input id="email" type="email" placeholder="Email"
      class="w-full p-2 mb-3 bg-black border border-gray-700 rounded">

    <input id="password" type="password" placeholder="Password"
      class="w-full p-2 mb-4 bg-black border border-gray-700 rounded">

    <button onclick="login()" class="w-full bg-orange-500 py-2 rounded mb-2">Login</button>
    <button onclick="signup()" class="w-full border border-orange-500 py-2 rounded">Sign Up</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden p-6">

  <!-- STATS -->
  <div class="grid md:grid-cols-3 gap-4 mb-8">
    <div class="bg-gray-900 p-4 rounded">
      <h3>Clients</h3>
      <p id="client-count" class="text-2xl">0</p>
    </div>
    <div class="bg-gray-900 p-4 rounded">
      <h3>Leads</h3>
      <p id="lead-count" class="text-2xl">0</p>
    </div>
    <div class="bg-gray-900 p-4 rounded">
      <h3>Policies</h3>
      <p id="policy-count" class="text-2xl">0</p>
    </div>
  </div>

  <!-- CLIENTS -->
  <div class="mb-10">
    <h2 class="text-xl mb-2">Clients</h2>
    <button onclick="addClient()" class="bg-orange-500 px-3 py-1 rounded mb-2">Add Client</button>
    <div id="clients-list"></div>
  </div>

  <!-- LEADS -->
  <div class="mb-10">
    <h2 class="text-xl mb-2">Leads</h2>
    <button onclick="addLead()" class="bg-orange-500 px-3 py-1 rounded mb-2">Add Lead</button>
    <div id="leads-list"></div>
  </div>

  <!-- POLICIES -->
  <div>
    <h2 class="text-xl mb-2">Policies</h2>
    <button onclick="addPolicy()" class="bg-orange-500 px-3 py-1 rounded mb-2">Add Policy</button>
    <div id="policies-list"></div>
  </div>

</div>

<script>
  // 🔑 CONFIG
  const SUPABASE_URL = "https://YOUR_PROJECT.supabase.co";
  const SUPABASE_KEY = "YOUR_ANON_KEY";

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // 📡 API SIMULATION
  const API = {
    getClients: () => supabase.from("clients").select("*"),
    createClient: (data) => supabase.from("clients").insert([data]),

    getLeads: () => supabase.from("leads").select("*"),
    createLead: (data) => supabase.from("leads").insert([data]),

    getPolicies: () => supabase.from("policies").select("*"),
    createPolicy: (data) => supabase.from("policies").insert([data])
  };

  // 🔐 AUTH
  async function signup() {
    const email = emailInput();
    const password = passwordInput();
    const { error } = await supabase.auth.signUp({ email, password });
    if (error) alert(error.message);
    else alert("Check your email!");
  }

  async function login() {
    const email = emailInput();
    const password = passwordInput();
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) alert(error.message);
  }

  async function logout() {
    await supabase.auth.signOut();
  }

  function emailInput() {
    return document.getElementById("email").value;
  }

  function passwordInput() {
    return document.getElementById("password").value;
  }

  function showDashboard(user) {
    document.getElementById("login-box").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");

    document.getElementById("auth-section").classList.add("hidden");
    document.getElementById("user-section").classList.remove("hidden");
    document.getElementById("user-email").innerText = user.email;

    loadAll();
  }

  function showLoggedOut() {
    document.getElementById("login-box").classList.remove("hidden");
    document.getElementById("dashboard").classList.add("hidden");

    document.getElementById("auth-section").classList.remove("hidden");
    document.getElementById("user-section").classList.add("hidden");
  }

  supabase.auth.onAuthStateChange((event, session) => {
    if (session) showDashboard(session.user);
    else showLoggedOut();
  });

  // 📊 LOAD DATA
  async function loadAll() {
    loadClients();
    loadLeads();
    loadPolicies();
  }

  async function loadClients() {
    const { data } = await API.getClients();
    document.getElementById("client-count").innerText = data.length;

    const list = document.getElementById("clients-list");
    list.innerHTML = "";

    data.forEach(c => {
      list.innerHTML += `<div class="bg-gray-800 p-2 mb-1 rounded">${c.name}</div>`;
    });
  }

  async function loadLeads() {
    const { data } = await API.getLeads();
    document.getElementById("lead-count").innerText = data.length;

    const list = document.getElementById("leads-list");
    list.innerHTML = "";

    data.forEach(l => {
      list.innerHTML += `<div class="bg-gray-800 p-2 mb-1 rounded">${l.name} (${l.status})</div>`;
    });
  }

  async function loadPolicies() {
    const { data } = await API.getPolicies();
    document.getElementById("policy-count").innerText = data.length;

    const list = document.getElementById("policies-list");
    list.innerHTML = "";

    data.forEach(p => {
      list.innerHTML += `<div class="bg-gray-800 p-2 mb-1 rounded">${p.policy_type} - $${p.premium}</div>`;
    });
  }

  // ➕ ADD DATA
  async function addClient() {
    const name = prompt("Client Name:");
    const email = prompt("Email:");
    await API.createClient({ name, email });
    loadClients();
  }

  async function addLead() {
    const name = prompt("Lead Name:");
    const email = prompt("Email:");
    await API.createLead({ name, email });
    loadLeads();
  }

  async function addPolicy() {
    const policy_type = prompt("Policy Type:");
    const premium = prompt("Premium:");
    await API.createPolicy({ policy_type, premium });
    loadPolicies();
  }

  // INIT
  window.onload = async () => {
    const { data } = await supabase.auth.getSession();
    if (data.session) showDashboard(data.session.user);
    else showLoggedOut();
  };
</script>

</body>
</html>
