<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LAVA Carrier | Dashboard</title>
<link href="https://unpkg.com/lucide-static@latest/font/lucide.css" rel="stylesheet" />

<style>
  * {margin:0; padding:0; box-sizing:border-box; font-family:"Poppins", Arial, sans-serif;}
  body {background-color:#eef1f5;}

  nav {
    background:#1b1f52;
    color:#fff;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    position:fixed;
    top:0; left:0; right:0;
    z-index:100;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
  }

  .navbar-brand {
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:700;
    color:#fff;
    text-decoration:none;
  }

  .navbar-brand img {height:38px; border-radius:6px;}

  .nav-right {display:flex; align-items:center; gap:15px;}

  .btn {
    padding:8px 14px;
    border:none;
    border-radius:6px;
    font-weight:600;
    cursor:pointer;
  }

  .btn-primary {background:#0d6efd; color:#fff;}
  .btn-outline {background:transparent; color:#fff; border:2px solid #fff;}

  .dashboard-wrapper {
    display:flex;
    height:100vh;
    margin-top:60px;
  }

  aside {
    background:#242a61;
    color:#fff;
    width:240px;
    display:flex;
    flex-direction:column;
    padding:20px 0;
  }

  aside a {
    color:#fff;
    text-decoration:none;
    padding:12px 20px;
    display:flex;
    align-items:center;
    gap:10px;
  }

  main {
    flex:1;
    padding:25px;
    overflow-y:auto;
  }

  .card {
    background:#fff;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    padding:16px;
    margin-bottom:20px;
  }

  .welcome {
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:20px;
  }

  .welcome img {height:60px; border-radius:6px;}

  /* ✅ NEW BANNER STYLE */
  .automation-banner {
    display:none;
    margin-bottom:20px;
  }

  .automation-banner img {
    width:100%;
    max-height:300px;
    object-fit:cover;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
  }

  #loginContainer {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f4f7f6;
  }

  #loginForm {
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    width:300px;
    display:flex;
    flex-direction:column;
    gap:15px;
  }

  .form-input {
    width:100%;
    padding:8px;
    border:1px solid #ccc;
    border-radius:6px;
  }

  .alert {
    position:fixed;
    top:20px;
    right:20px;
    background:#d4edda;
    color:#155724;
    padding:10px 16px;
    border-radius:8px;
    display:none;
    z-index:200;
  }

  .alert.error {
    background:#f8d7da;
    color:#721c24;
  }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginContainer">
  <form id="loginForm">
    <h2 style="color:#0d6efd;text-align:center;">Agent Login</h2>
    <input type="text" id="firstName" placeholder="First Name" class="form-input" required>
    <input type="text" id="lastName" placeholder="Last Name" class="form-input" required>
    <input type="password" id="password" placeholder="Password" class="form-input" required>
    <button class="btn btn-primary" type="submit">Login</button>
  </form>
</div>

<!-- DASHBOARD -->
<div id="dashboardContainer" style="display:none;">

  <nav>
    <a class="navbar-brand">
      <img src="images/lava-carrier-logo.png">
      LAVA Carrier
    </a>

    <div class="nav-right">
      <button class="btn btn-outline" onclick="startQuote()">Start Quote</button>
      <span id="agent-display"></span>
      <a href="#" onclick="logout()" style="color:white;">Logout</a>
    </div>
  </nav>

  <div class="dashboard-wrapper">

    <aside>
      <a href="#">Lookup</a>
      <a href="#">Tools</a>
      <a href="#">Reports</a>
    </aside>

    <main>

      <div class="welcome">
        <img src="images/lava-carrier-logo.png">
        <h2 id="welcome-agent-msg"></h2>
      </div>

      <!-- ✅ NEW AUTOMATION IMAGE -->
      <div id="automationBanner" class="automation-banner">
        <img src="images/lavaautomation.png" alt="Lava Automation">
      </div>

      <div class="card">
        <h3>Dashboard Ready</h3>
        <p>Welcome to your system overview.</p>
      </div>

    </main>
  </div>
</div>

<div class="alert" id="alertBox"></div>

<script>

function showAlert(msg, type="success") {
  const box = document.getElementById("alertBox");
  box.textContent = msg;
  box.className = "alert" + (type==="error"?" error":"");
  box.style.display = "block";
  setTimeout(()=>box.style.display="none",3000);
}

function startQuote() {
  window.location.href = "quote.html";
}

function logout() {
  sessionStorage.clear();
  location.reload();
}

document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();

  const first = document.getElementById("firstName").value;
  const last = document.getElementById("lastName").value;

  if(first && last){
    sessionStorage.setItem("first", first);
    sessionStorage.setItem("last", last);

    document.getElementById("loginContainer").style.display="none";
    document.getElementById("dashboardContainer").style.display="block";

    const full = first + " " + last;
    document.getElementById("welcome-agent-msg").textContent = "Hi " + full;
    document.getElementById("agent-display").textContent = full;

    // ✅ SHOW IMAGE AFTER LOGIN
    document.getElementById("automationBanner").style.display = "block";
  }
});

document.addEventListener("DOMContentLoaded", ()=>{
  const first = sessionStorage.getItem("first");
  const last = sessionStorage.getItem("last");

  if(first && last){
    document.getElementById("loginContainer").style.display="none";
    document.getElementById("dashboardContainer").style.display="block";

    const full = first + " " + last;
    document.getElementById("welcome-agent-msg").textContent = "Hi " + full;
    document.getElementById("agent-display").textContent = full;

    // ✅ SHOW IMAGE ON SESSION RESTORE
    document.getElementById("automationBanner").style.display = "block";
  }
});

</script>

</body>
</html>
